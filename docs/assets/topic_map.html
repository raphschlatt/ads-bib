    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000000;
        font-family: Cinzel;
        color: #ffffff;
      }
      .container-box {
        margin: 8px 16px 8px 16px;
        padding: 12px;
        border-radius: 16px;
        line-height: 0.95;
        width: fit-content;
        height: fit-content;
        z-index: 2;
        backdrop-filter: blur(3px);
        background: #000000aa;
        box-shadow: 2px 3px 10px #00000044;
        position: relative;
        pointer-events: auto;
      }
      .more-opaque {
        backdrop-filter: blur(6px);
        background-color: #000000ee;
      }
      #deck-container {
        width: 100vw;
        height: 100vh;  
      }
      #deck-container canvas {
        z-index: 1;
        background: #000000;
      }
      .deck-tooltip {
          
            font-size: 0.8em;
            font-family: Cinzel;
            font-weight: 300;
            color: #ffffff !important;
            background-color: #000000ee !important;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 2px 3px 10px #00000044;
            max-width: 25%;
      }
      input {
        margin: 2px;
        padding: 4px;
        border-radius: 8px;
        color: #ffffff;
        background: #000000dd;
        border: 2px inset #77777744;
        transition: 0.5s;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border: 2px inset #555;
      }
      #search-container{
        width: fit-content;
      }
      
#ads-topic-panel {
    display: none;
    flex-direction: column;
    min-width: 320px;
    max-width: min(32vw, 460px);
    max-height: 80vh;
    padding: 0;
    overflow: hidden;
    overscroll-behavior: contain;
}
#ads-topic-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin: 0;
    padding: 10px 12px;
    border: 0;
    border-bottom: 1px solid rgba(17, 24, 39, 0.16);
    background: transparent;
    color: inherit;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
}
#ads-topic-panel-title {
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
#ads-topic-panel-toggle {
    font-size: 18px;
    line-height: 1;
    user-select: none;
}
#ads-topic-panel-body {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 0;
    gap: 8px;
    padding: 8px 12px 12px;
}
#ads-topic-panel.is-collapsed #ads-topic-panel-body {
    display: none;
}
#ads-topic-panel-rows {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    gap: 2px;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    touch-action: pan-y;
}
#ads-topic-panel-rows::-webkit-scrollbar {
    width: 10px;
}
#ads-topic-panel-rows::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(127, 127, 127, 0.45);
}
.ads-topic-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    line-height: 1.12;
}
.ads-topic-row-prefix {
    display: inline-flex;
    align-items: flex-start;
    flex: 0 0 auto;
    gap: 8px;
}
.ads-topic-row:hover {
    background-color: rgba(127, 127, 127, 0.12);
}
.ads-topic-row.is-selected {
    background-color: rgba(127, 127, 127, 0.16);
}
.ads-topic-row-label {
    flex: 1 1 auto;
    min-width: 0;
    white-space: normal;
    word-break: break-word;
}
.ads-topic-row-layer {
    display: block;
    margin-bottom: 2px;
    opacity: 0.75;
    font-size: 0.72em;
    letter-spacing: 0.03em;
    text-transform: uppercase;
}
.ads-topic-expand {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    min-width: 16px;
    height: 16px;
    margin-top: 1px;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 12px;
}
.ads-topic-swatch {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    min-width: 12px;
    height: 12px;
    margin-top: 3px;
    border-radius: 2px;
    color: #ffffff;
    font-size: 10px;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
}
body.darkmode #ads-topic-panel,
body.darkmode #d3histogram-container.more-opaque,
body.darkmode #word-cloud.more-opaque,
body.darkmode #topic-tree.more-opaque,
body.darkmode #search-container.more-opaque,
body.darkmode #title-container.more-opaque {
    background-color: rgba(22, 27, 34, 0.97) !important;
    color: #e0e0e0 !important;
}
body.darkmode #ads-topic-panel-header {
    border-bottom-color: #30363d;
}
body.darkmode .ads-topic-row:hover {
    background-color: rgba(255, 255, 255, 0.1);
}
body.darkmode .ads-topic-row.is-selected {
    background-color: rgba(255, 255, 255, 0.15);
}
body.darkmode #ads-topic-panel,
body.darkmode #ads-topic-panel * {
    color: #e0e0e0 !important;
}
body:not(.darkmode) #ads-topic-panel,
body:not(.darkmode) #d3histogram-container.more-opaque,
body:not(.darkmode) #word-cloud.more-opaque,
body:not(.darkmode) #topic-tree.more-opaque,
body:not(.darkmode) #search-container.more-opaque,
body:not(.darkmode) #title-container.more-opaque {
    background-color: rgba(255, 255, 255, 0.96) !important;
    color: #111111 !important;
}

#word-cloud {
    position: relative;
    display: none;
    width: 500px;
    height: 300px;
    z-index: 10;
}

  <script>
    LAYER_ORDER=['imageLayer','dataPointLayer','boundaryLayer','labelLayer'];function getLayerIndex(object){return LAYER_ORDER.indexOf(object.id);}
function isFontLoaded(fontName){return document.fonts.check(`12px "${fontName}"`);}
function waitForFont(fontName,maxWait=500){return new Promise((resolve,reject)=>{if(isFontLoaded(fontName)){resolve();}else{const startTime=Date.now();const interval=setInterval(()=>{if(isFontLoaded(fontName)){clearInterval(interval);resolve();}else if(Date.now()-startTime>maxWait){clearInterval(interval);reject(new Error(`Font ${fontName} did not load within ${maxWait}ms`));}},50);}});}
function getInitialViewportSize(){const width=document.documentElement.clientWidth;const height=document.documentElement.clientHeight;return{viewportWidth:width,viewportHeight:height};}
function calculateZoomLevel(bounds,viewportWidth,viewportHeight,padding=0.5){const lngRange=bounds[1]-bounds[0];const latRange=bounds[3]-bounds[2];const centerLng=(bounds[0]+bounds[1])/2;const centerLat=(bounds[2]+bounds[3])/2;const zoomX=Math.log2(360/(lngRange/(viewportWidth/256)));const zoomY=Math.log2(180/(latRange/(viewportHeight/256)));const zoom=Math.min(zoomX,zoomY)-padding;return{zoomLevel:zoom,dataCenter:[centerLng,centerLat]};}
class DataMap{constructor({container,bounds,searchItemId="text-search",lassoSelectionItemId="lasso-selection",}){this.container=container;this.searchItemId=searchItemId;this.lassoSelectionItemId=lassoSelectionItemId;this.pointData=null;this.labelData=null;this.metaData=null;this.layers=[];const{viewportWidth,viewportHeight}=getInitialViewportSize();const{zoomLevel,dataCenter}=calculateZoomLevel(bounds,viewportWidth,viewportHeight);this.deckgl=new deck.DeckGL({container:container,initialViewState:{latitude:dataCenter[1],longitude:dataCenter[0],zoom:zoomLevel},controller:{scrollZoom:{speed:0.01,smooth:true}},});this.updateTriggerCounter=0;this.dataSelectionManager=new DataSelectionManager(lassoSelectionItemId);}
addPoints(pointData,{pointSize,pointOutlineColor=[250,250,250,128],pointLineWidth=0.001,pointHoverColor=[170,0,0,187],pointLineWidthMaxPixels=3,pointLineWidthMinPixels=0.001,pointRadiusMaxPixels=16,pointRadiusMinPixels=0.2,}){const numPoints=pointData.x.length;const positions=new Float32Array(numPoints*2);const colors=new Uint8Array(numPoints*4);const variableSize=pointSize<0;let sizes;if(variableSize){sizes=new Float32Array(numPoints);}else{sizes=null;}
for(let i=0;i<numPoints;i++){positions[i*2]=pointData.x[i];positions[i*2+1]=pointData.y[i];colors[i*4]=pointData.r[i];colors[i*4+1]=pointData.g[i];colors[i*4+2]=pointData.b[i];colors[i*4+3]=pointData.a[i];if(variableSize){sizes[i]=pointData.size[i];}}
this.originalColors=colors;this.selected=new Float32Array(numPoints).fill(1.0);this.pointSize=pointSize;this.pointOutlineColor=pointOutlineColor;this.pointLineWidth=pointLineWidth;this.pointHoverColor=pointHoverColor;this.pointLineWidthMaxPixels=pointLineWidthMaxPixels;this.pointLineWidthMinPixels=pointLineWidthMinPixels;this.pointRadiusMaxPixels=pointRadiusMaxPixels;this.pointRadiusMinPixels=pointRadiusMinPixels;let scatterAttributes={getPosition:{value:positions,size:2},getFillColor:{value:colors,size:4},getFilterValue:{value:this.selected,size:1}};if(variableSize){scatterAttributes.getRadius={value:sizes,size:1};}
this.pointLayer=new deck.ScatterplotLayer({id:'dataPointLayer',data:{length:numPoints,attributes:scatterAttributes},getRadius:this.pointSize,getLineColor:this.pointOutlineColor,getLineWidth:this.pointLineWidth,highlightColor:this.pointHoverColor,lineWidthMaxPixels:this.pointLineWidthMaxPixels,lineWidthMinPixels:this.pointLineWidthMinPixels,radiusMaxPixels:this.pointRadiusMaxPixels,radiusMinPixels:this.pointRadiusMinPixels,radiusUnits:"common",lineWidthUnits:"common",autoHighlight:true,pickable:true,stroked:true,extensions:[new deck.DataFilterExtension({filterSize:1})],filterRange:[-0.5,1.5],filterSoftRange:[0.75,1.25],updateTriggers:{getFilterValue:this.updateTriggerCounter},instanceCount:numPoints,parameters:{depthTest:false}});this.layers.push(this.pointLayer);this.layers.sort((a,b)=>getLayerIndex(a)-getLayerIndex(b));this.deckgl.setProps({layers:[...this.layers]});}
addLabels(labelData,{labelTextColor=d=>[d.r,d.g,d.b],textMinPixelSize=18,textMaxPixelSize=36,textOutlineWidth=8,textOutlineColor=[238,238,238,221],textBackgroundColor=[255,255,255,64],fontFamily="Roboto",fontWeight=900,lineSpacing=0.95,textCollisionSizeScale=3.0,pickable=false,}){const numLabels=labelData.length;this.labelTextColor=labelTextColor;this.textMinPixelSize=textMinPixelSize;this.textMaxPixelSize=textMaxPixelSize;this.textOutlineWidth=textOutlineWidth;this.textOutlineColor=textOutlineColor;this.textBackgroundColor=textBackgroundColor;this.fontFamily=fontFamily;this.fontWeight=fontWeight;this.lineSpacing=lineSpacing;this.textCollisionSizeScale=textCollisionSizeScale;waitForFont(this.fontFamily);this.labelLayer=new deck.TextLayer({id:'labelLayer',data:labelData,pickable:pickable,getPosition:d=>[d.x,d.y],getText:d=>d.label,getColor:this.labelTextColor,getSize:d=>d.size,sizeScale:1,sizeMinPixels:this.textMinPixelSize,sizeMaxPixels:this.textMaxPixelSize,outlineWidth:this.textOutlineWidth,outlineColor:this.textOutlineColor,getBackgroundColor:this.textBackgroundColor,getBackgroundPadding:[15,15,15,15],background:true,characterSet:"auto",fontFamily:this.fontFamily,fontWeight:this.fontWeight,lineHeight:this.lineSpacing,fontSettings:{"sdf":true},getTextAnchor:"middle",getAlignmentBaseline:"center",lineHeight:0.95,elevation:100,collisionEnabled:true,getCollisionPriority:d=>d.size,collisionTestProps:{sizeScale:this.textCollisionSizeScale,sizeMaxPixels:this.textMaxPixelSize*2,sizeMinPixels:this.textMinPixelSize*2},extensions:[new deck.CollisionFilterExtension()],instanceCount:numLabels,parameters:{depthTest:false}});this.layers.push(this.labelLayer);this.layers.sort((a,b)=>getLayerIndex(a)-getLayerIndex(b));this.deckgl.setProps({layers:[...this.layers]});}
addBoundaries(boundaryData,{clusterBoundaryLineWidth=0.5}){const numBoundaries=boundaryData.length;this.clusterBoundaryLineWidth=clusterBoundaryLineWidth;this.boundaryLayer=new deck.PolygonLayer({id:'boundaryLayer',data:boundaryData,stroked:true,filled:false,getLineColor:d=>[d.r,d.g,d.b,d.a],getPolygon:d=>d.polygon,lineWidthUnits:"common",getLineWidth:d=>d.size*d.size,lineWidthScale:this.clusterBoundaryLineWidth*5e-5,lineJointRounded:true,lineWidthMaxPixels:4,lineWidthMinPixels:0.0,instanceCount:numBoundaries,parameters:{depthTest:false}});this.layers.push(this.boundaryLayer);this.layers.sort((a,b)=>getLayerIndex(a)-getLayerIndex(b));this.deckgl.setProps({layers:[...this.layers]});}
addMetaData(metaData,{tooltipFunction=({index})=>this.metaData.hover_text[index],onClickFunction=null,searchField=null,}){this.metaData=metaData;this.tooltipFunction=tooltipFunction;this.onClickFunction=onClickFunction;this.searchField=searchField;if(this.metaData.hasOwnProperty('hover_text')){this.deckgl.setProps({getTooltip:this.tooltipFunction,});}
if(this.onClickFunction){this.deckgl.setProps({onClick:this.onClickFunction,});}
if(this.searchField){this.searchArray=this.metaData[this.searchField].map(d=>d.toLowerCase());}}
connectHistogram(histogramItem){this.histogramItem=histogramItem;this.histogramItemId=histogramItem.state.chart.chartContainerId;}
addBackgroundImage(image,bounds){this.imageLayer=new deck.BitmapLayer({id:'imageLayer',bounds:bounds,image:image,parameters:{depthTest:false}});this.layers.push(this.imageLayer);this.layers.sort((a,b)=>getLayerIndex(a)-getLayerIndex(b));this.deckgl.setProps({layers:[...this.layers]});}
async addSelectionHandler(callback,selectionKind="lasso-selection",timeoutMs=60000){const startTime=Date.now();if(selectionKind==="lasso-selection"){while(!this.lassoSelector){if(Date.now()-startTime>timeoutMs){throw new Error('Timeout: lassoSelector did not become available within the specified timeout period');}
await new Promise(resolve=>setTimeout(resolve,1000));}

    if (row.hasChildren) {

      expandButton.type = "button";
      expandButton.className = "ads-topic-expand";
      expandButton.textContent = state.expandedKeys.has(row.key) ? "▼" : "▶";
      expandButton.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleExpanded(row.key);
      });
      prefix.appendChild(expandButton);
    } else if (TOPIC_PANEL_PAYLOAD.mode === "hierarchical") {
      const emptyExpand = document.createElement("span");
      emptyExpand.className = "ads-topic-expand";
      emptyExpand.style.visibility = "hidden";
      prefix.appendChild(emptyExpand);
    }

    const swatch = document.createElement("span");
    swatch.className = "ads-topic-swatch";
    swatch.style.backgroundColor = row.color;
    swatch.textContent = state.selectedKeys.has(row.key) ? "✓" : "";

    const labelWrapper = document.createElement("span");
    labelWrapper.className = "ads-topic-row-label";

    const labelText = document.createElement("span");
    labelText.textContent = row.label;
    labelWrapper.appendChild(labelText);

    prefix.appendChild(swatch);
    rowElement.appendChild(prefix);
    rowElement.appendChild(labelWrapper);
    rowElement.addEventListener("click", () => toggleSelection(row.key));

    return rowElement;
  }

  function renderRows() {
    const rowsContainer = document.getElementById(rowsId);
    if (!rowsContainer) {
      return;
    }

    rowsContainer.innerHTML = "";
    for (const key of orderedRowKeys) {
      const row = rowMap.get(key);
      if (!row || !rowVisible(row)) {
        continue;
      }
      rowsContainer.appendChild(buildRow(row));
    }
  }

  function initPanel() {
    addMoreOpaque("title-container");
    addMoreOpaque("search-container");
    addMoreOpaque("topic-tree");
    addMoreOpaque("d3histogram-container");
    addMoreOpaque("word-cloud");
    if (!datamap || !datamap.metaData) {
      return false;
    }
    const panel = ensurePanel();
    const rowsContainer = document.getElementById(rowsId);
    if (panel && panel.dataset.scrollBound !== "true") {
      panel.addEventListener("wheel", (event) => event.stopPropagation(), { passive: true });
      panel.addEventListener("touchmove", (event) => event.stopPropagation(), { passive: true });
      panel.dataset.scrollBound = "true";
    }
    if (rowsContainer && rowsContainer.dataset.scrollBound !== "true") {
      rowsContainer.addEventListener("wheel", (event) => event.stopPropagation(), { passive: true });
      rowsContainer.addEventListener("touchmove", (event) => event.stopPropagation(), { passive: true });
      rowsContainer.dataset.scrollBound = "true";
    }
    renderRows();
    return true;
  }

  let attempts = 0;
  const timer = window.setInterval(() => {
    attempts += 1;
    if (initPanel() || attempts >= 200) {
      window.clearInterval(timer);
      initPanel();
    }
  }, 100);
})();

const _STOPWORDS = new Set(['mostly', 'everything', 'we', 'anyway', 'he', 'the', 'name', 'seems', 'she', 'whither', 'during', 'our', 'former', 'those', 'since', 'yourselves', 'see', 'sincere', 'if', 'hereafter', 'sometimes', 'mill', 'twelve', 'indeed', 'move', 'elsewhere', 'both', 'also', 'eg', 'nevertheless', 'all', 'thereby', 'their', 'hereby', 'so', 'may', 'rather', 'though', 'otherwise', 'on', 'might', 'sometime', 'everywhere', 'much', 'cry', 'from', 'whereby', 'although', 'hers', 'every', 'i', 'for', 'into', 'enough', 'behind', 'co', 'someone', 'never', 'who', 'throughout', 'at', 'whence', 'herein', 'too', 'however', 'whose', 'where', 'back', 'but', 'down', 'six', 'take', 'seem', 'several', 'three', 'hereupon', 'fifteen', 'were', 'eleven', 'which', 'therein', 'beyond', 'thereafter', 'will', 'without', 'yourself', 'above', 'side', 'thence', 'either', 'forty', 'herself', 'nine', 'across', 'put', 'whole', 'last', 'interest', 'whoever', 'ten', 'between', 'about', 'con', 'due', 'anyhow', 'is', 'they', 'itself', 'whom', 'again', 'himself', 'below', 'front', 'that', 'upon', 'whereupon', 'neither', 'up', 'while', 'ever', 'eight', 'full', 'do', 'fifty', 'seemed', 'wherever', 'show', 'nowhere', 'couldnt', 'can', 'has', 'thick', 'until', 'should', 'as', 'was', 'myself', 'around', 'two', 'always', 'ie', 'hundred', 'became', 'further', 'toward', 'therefore', 'give', 'nor', 'whereafter', 'more', 'noone', 'meanwhile', 'because', 'go', 'per', 'anything', 'bottom', 'somehow', 'only', 'hasnt', 'others', 'anywhere', 'else', 'before', 'perhaps', 'same', 'amongst', 'this', 'hence', 'whereas', 'none', 'your', 'besides', 'thereupon', 'have', 'had', 'moreover', 'me', 'ourselves', 'out', 'serious', 'no', 'except', 'wherein', 'latterly', 'how', 'you', 'ltd', 'least', 'un', 'seeming', 'few', 'most', 'whenever', 'could', 'together', 'thus', 'twenty', 'system', 'these', 'or', 'would', 'against', 'thru', 're', 'whatever', 'and', 'after', 'my', 'themselves', 'less', 'them', 'please', 'nothing', 'than', 'mine', 'with', 'namely', 'four', 'under', 'via', 'many', 'are', 'alone', 'even', 'when', 'being', 'cannot', 'such', 'etc', 'why', 'next', 'third', 'any', 'then', 'of', 'some', 'somewhere', 'amount', 'well', 'cant', 'once', 'very', 'beside', 'another', 'along', 'top', 'something', 'afterwards', 'in', 'find', 'to', 'own', 'yours', 'an', 'almost', 'his', 'now', 'part', 'over', 'within', 'among', 'become', 'yet', 'us', 'anyone', 'latter', 'by', 'its', 'done', 'detail', 'get', 'fill', 'describe', 'off', 'him', 'must', 'formerly', 'towards', 'five', 'whether', 'thin', 'her', 'through', 'keep', 'onto', 'made', 'a', 'be', 'de', 'there', 'am', 'inc', 'bill', 'empty', 'amoungst', 'sixty', 'been', 'becoming', 'already', 'here', 'still', 'other', 'fire', 'ours', 'found', 'often', 'one', 'beforehand', 'nobody', 'call', 'what', 'becomes', 'first', 'each', 'not', 'everyone', 'it']);
const _ROTATIONS = [0, -90, 90, -45, 45, -30, 30, -60, 60, -15, 15, -75, 75, -7.5, 7.5, -22.5, 22.5, -52.5, 52.5, -37.5, 37.5, -67.5, 67.5];
let wordCloudStackContainer = document.getElementsByClassName("stack bottom-right")[0];
const wordCloudItem = document.createElement("div");
wordCloudItem.id = "word-cloud";
wordCloudItem.className = "container-box more-opaque stack-box";
wordCloudStackContainer.appendChild(wordCloudItem);

const wordCloudSvg = d3.select("#word-cloud").append("svg")
    .attr("width", 500)
    .attr("height", 300)
    .append("g")
    .attr("transform", "translate(" + 500 / 2 + "," + 300 / 2 + ")");

var wordCounter = null;
if (false) {
    while (!datamap.metaData) {
        await new Promise(resolve => setTimeout(resolve, 100));
    }
    const globalIDF = new Map();
    const globalDocFreq = new Map();
    const globalTotalDocs = datamap.metaData.tokens_str.length;

    // Compute global IDF scores
    datamap.metaData.tokens_str.forEach(text => {
        const uniqueWords = new Set(
            text.toLowerCase()
                .split(/\s+/)
                .filter(word => !_STOPWORDS.has(word))
        );
        uniqueWords.forEach(word => {
            globalDocFreq.set(word, (globalDocFreq.get(word) || 0) + 1);
        });
    });
    globalDocFreq.forEach((freq, word) => {
        globalIDF.set(word, Math.log(globalTotalDocs / (0.5 + freq)));
    });

    wordCounter = function (textItems) {
        const tfIdfScores = new Map();
        const words = textItems.join(' ')
            .toLowerCase()
            .split(/\s+/)
            .filter(word => !_STOPWORDS.has(word));
        
        // Calculate term frequencies
        words.forEach(word => {
            tfIdfScores.set(word, (tfIdfScores.get(word) || 0) + 1);
        });
        
        // Convert raw counts to TF-IDF scores
        const result = Array.from(tfIdfScores, ([word, tf]) => ({
            text: word,
            size: Math.sqrt(tf) * (globalIDF.get(word) || 0)
        }))
        .sort((a, b) => b.size - a.size)
        .slice(0, 256); 
        
        // Normalize scores to [0,1] range
        const maxSize = Math.max(...result.map(x => x.size));
        return result.map(({text, size}) => ({
            text,
            size: size / maxSize
        }));
    }
} else {
    wordCounter = function (textItems) {
        const words = textItems.join(' ').toLowerCase().split(/\s+/);
        const wordCounts = new Map();
        words.forEach(word => {
            wordCounts.set(word, (wordCounts.get(word) || 0) + 1);
        });
        _STOPWORDS.forEach(stopword => wordCounts.delete(stopword));
        const result = Array.from(wordCounts, ([word, frequency]) => ({ text: word, size: Math.sqrt(frequency) }))
                            .sort((a, b) => b.size - a.size).slice(0, 256);
        const maxSize = Math.max(...(result.map(x => x.size)));
        return result.map(({text, size}) => ({ text: text, size: (size / maxSize)}));
    }
}

function generateWordCloud(words) {
  const width = 500;
  const height = 300;

  const colorScale = d3.scaleSequential(d3.interpolateTurbo).domain([0, width / 10]);

  // Configure a cloud layout
  const layout = d3.layout.cloud()
    .size([width, height])
    .words(words.map(d => ({text: d.text, size: d.size * width / 10})))
    .padding(1)
    .rotate(() => _ROTATIONS[~~(Math.random() * 0)])
    .font("Cinzel")
    .fontSize(d => d.size)
    .fontWeight(d => Math.max(300, Math.min(d.size * 9000 / width, 900)))
    .on("end", draw);

  layout.start();

  function draw(words) {
    const t = d3.transition().duration(300);
    
    // Update existing words
    const text = wordCloudSvg.selectAll("text")
      .data(words, d => d.text);
    
    // Remove old words
    text.exit()
      .transition(t)
      .attr("fill-opacity", 0)
      .attr("font-size", 1)
      .remove();
    // Add new words
    text.enter()
      .append("text")
      .attr("text-anchor", "middle")
      .attr("fill-opacity", 0)
      .attr("font-size", 1)
      .attr("font-family", "Cinzel")
      .text(d => d.text)
      .merge(text) // Merge enter and update selections
      .transition(t)
      .attr("transform", d => "translate(" + [d.x, d.y] + ")rotate(" + d.rotate + ")")
      .attr("fill-opacity", 1)
      .attr("font-size", d => d.size)
      .attr("font-weight", d => Math.max(300, Math.min(d.size * 9000 / width, 900)))
      .attr("fill", d => colorScale(d.size));
  }
}

const shuffle = ([...arr]) => {
  let m = arr.length;
  while (m) {
    const i = Math.floor(Math.random() * m--);
    [arr[m], arr[i]] = [arr[i], arr[m]];
  }
  return arr;
};
const sampleSize = ([...arr], n = 1) => shuffle(arr).slice(0, n);

function wordCloudCallback(selectedPoints) {
    if (selectedPoints.length > 0) {
        $(wordCloudItem).animate({height:'show'}, 250);
    } else {
        $(wordCloudItem).animate({height:'hide'}, 250);
    }
    let selectedText;
    if (datamap.metaData) {
        selectedText = sampleSize(selectedPoints, 10000).map(i => datamap.metaData.tokens_str[i]);
    } else {
        selectedText = ["Meta data still loading ..."];
    }
    const wordCounts = wordCounter(selectedText);
    generateWordCloud(wordCounts);
}

await datamap.addSelectionHandler(debounce(wordCloudCallback, 100));
