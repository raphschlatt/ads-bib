[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ads-bib"
version = "0.1.0"
description = "NASA ADS bibliometric analysis pipeline for citation networks, topic modeling, and dataset curation."
readme = "README.md"
license = "MIT"
authors = [
    { name = "ADS Pipeline contributors" },
]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "PyYAML",
    "pandas>=2.0",
    "numpy>=1.24",
    "requests",
    "python-dotenv",
    "fasttext-wheel",
    "spacy>=3.7",
    "tqdm",
    "scipy>=1.10",
]

[project.urls]
Homepage = "https://github.com/raphschlatt/ADS_Pipeline"
Repository = "https://github.com/raphschlatt/ADS_Pipeline"
Issues = "https://github.com/raphschlatt/ADS_Pipeline/issues"

[project.scripts]
ads-bib = "ads_bib.cli:main"

[project.optional-dependencies]
topic = [
    "bertopic",
    "sentence-transformers",
    "scikit-learn",
    "datamapplot",
    "pacmap",
    "fast-hdbscan",
    "litellm",
    "openai",
    "toponymy",
    "evoc",
    "seaborn",
    "matplotlib",
]
umap = ["umap-learn"]
hdbscan = ["hdbscan"]
translate-local = ["transformers", "torch", "accelerate"]
translate-api = ["openai"]
test = ["pytest>=7", "ruff>=0.6"]
all = ["ads-bib[topic,translate-local,translate-api]"]

[tool.hatch.build.targets.wheel]
packages = ["src/ads_bib"]

[tool.pytest.ini_options]
markers = [
    "slow: slower integration or dependency-heavy tests",
]
addopts = "--strict-markers"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
ignore = ["F821"]
