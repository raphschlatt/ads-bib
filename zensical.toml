[project]
site_name = "ads-bib"
site_description = "Pipeline for querying and turning NASA's ADS publications metadata into curated, analysis-ready datasets, topic maps, and citation networks."
site_author = "Raphael Schlattmann"
site_url = "https://raphschlatt.github.io/ads-bib/"
repo_url = "https://github.com/raphschlatt/ads-bib"
edit_uri = "edit/main/docs"
extra_javascript = [
    "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js",
]
extra_css = ["stylesheets/github-theme.css"]
copyright = """
Copyright &copy; 2026 Raphael Schlattmann
"""

nav = [
  { Home = "index.md" },
  { "Get Started" = [
    { "Install & First Run" = "get-started.md" },
    { "Runtime Roads" = "runtime-roads.md" },
  ] },
  { Concepts = [
    { "Search & Query Design" = "search-query-design.md" },
    { "Topic Modeling" = "topic-modeling.md" },
    { "Citation Networks" = "citation-networks.md" },
  ] },
  { Guides = [
    { "Pipeline Tuning" = "pipeline-guide.md" },
    { "Python API" = "python-api.md" },
  ] },
  { Reference = [
    { Configuration = "configuration.md" },
    { "Output Artifacts" = "outputs.md" },
    { Troubleshooting = "troubleshooting.md" },
  ] },
  { "Developer Notes" = [
    { Overview = "developer-notes/index.md" },
    { "Manual Provider Parity" = "developer-notes/manual_provider_parity.md" },
    { Release = "developer-notes/release.md" },
  ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "blue"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/raphschlatt/ads-bib"
