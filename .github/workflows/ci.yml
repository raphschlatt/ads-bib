name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies (core + tests)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[translate-api,test]"

      - name: Ruff
        run: ruff check src tests scripts

      - name: Pytest (excluding topic-stack tests)
        run: pytest -q -m "not requires_topic_stack"

      - name: Notebook contract
        run: pytest -q tests/test_pipeline_notebook_contract.py

  topic-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Add swap (mitigate OOM during large pip installs)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Install dependencies (topic + extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[topic,translate-api,translate-nllb,test,umap,hdbscan]"
          python -m pip install build twine

      - name: Pytest (full)
        run: pytest -q

      - name: Build sdist/wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Wheel smoke (core)
        run: |
          python -m venv /tmp/ads_pkg_smoke
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL"
          python -c "import ads_bib; print(ads_bib.__version__)"
          python -c "import ads_bib.search, ads_bib.export, ads_bib.tokenize, ads_bib.translate, ads_bib.citations"
          ads-bib preset list
          ads-bib preset write openrouter --output /tmp/openrouter.yaml
          test -f /tmp/openrouter.yaml
          grep -q "run_name: ads_bib_openrouter" /tmp/openrouter.yaml

      - name: Wheel smoke (topic extras)
        run: |
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL[topic,umap,hdbscan]"
          python -c "import ads_bib.topic_model, ads_bib.visualize"
