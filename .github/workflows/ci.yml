name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (core + tests)
        run: uv sync --frozen --extra test

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest (excluding topic-stack tests)
        run: uv run pytest -q -m "not requires_topic_stack"

  topic-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Add swap (mitigate OOM during large pip installs)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Install dependencies (base + optional overrides + tests)
        run: |
          uv pip install "torch==2.6.0" --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[test,umap,hdbscan]"
          uv pip install build twine

      - name: Pytest (full)
        run: uv run pytest -q

      - name: Build sdist/wheel
        run: uv run python -m build

      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Wheel smoke (core)
        run: |
          python -m venv /tmp/ads_pkg_smoke
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL"
          python -c "import ads_bib; print(ads_bib.__version__)"
          python -c "import ads_bib.search, ads_bib.export, ads_bib.tokenize, ads_bib.translate, ads_bib.citations"
          ads-bib preset list
          ads-bib preset write openrouter --output /tmp/ads-bib-smoke.yaml
          test -f /tmp/ads-bib-smoke.yaml
          grep -q "run_name: ads_bib_openrouter" /tmp/ads-bib-smoke.yaml
          ads-bib bootstrap --project-root /tmp/ads_bootstrap_smoke --env-file .env
          test -d /tmp/ads_bootstrap_smoke/data/raw
          test -d /tmp/ads_bootstrap_smoke/runs
          grep -q "ADS_TOKEN=" /tmp/ads_bootstrap_smoke/.env
          ADS_TOKEN=dummy ads-bib doctor --config /tmp/ads-bib-smoke.yaml --to search --set search.query='author:"test"'

      - name: Wheel smoke (optional overrides)
        run: |
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL[umap,hdbscan]"
          python -c "import ads_bib.topic_model, ads_bib.visualize"

  windows-managed-runtime-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install build dependency
        shell: pwsh
        run: uv pip install build

      - name: Build wheel
        shell: pwsh
        run: uv run python -m build --wheel

      - name: Wheel smoke (managed llama-server Windows CPU startup)
        shell: pwsh
        run: |
          $smokeRoot = Join-Path $env:RUNNER_TEMP "ads_pkg_smoke_windows"
          if (Test-Path $smokeRoot) {
            Remove-Item -Recurse -Force $smokeRoot
          }
          uv venv $smokeRoot
          $venvPython = Join-Path $smokeRoot "Scripts\python.exe"
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          uv pip install --python $venvPython $wheel
          @'
          import json
          import os
          import tempfile
          from pathlib import Path

          from ads_bib._utils.llama_server import (
              LlamaServerConfig,
              MANAGED_LLAMA_CPP_RELEASE_TAG,
              build_openai_client,
              ensure_llama_server,
              prepare_llama_server_runtime,
              probe_server_ready,
              stop_all_llama_servers,
          )
          from ads_bib._utils.model_specs import ModelSpec

          project_root = Path(tempfile.mkdtemp(prefix="ads-managed-runtime-")).resolve()
          os.environ["HF_HOME"] = str(project_root / "hf_home")
          os.environ["PATH"] = ""
          runtime_log_path = project_root / "runtime.log"

          config = LlamaServerConfig(
              command="llama-server",
              gpu_layers=0,
              ctx_size=2048,
              startup_timeout_s=240.0,
          )
          model_spec = ModelSpec(
              model_repo="Qwen/Qwen2.5-0.5B-Instruct-GGUF",
              model_file="qwen2.5-0.5b-instruct-q5_k_m.gguf",
          )

          try:
              first = prepare_llama_server_runtime(
                  config=config,
                  project_root=project_root,
                  runtime_log_path=runtime_log_path,
              )
              resolved = Path(first.command).resolve()
              expected_root = (
                  project_root
                  / "data"
                  / "models"
                  / "llama_cpp"
                  / MANAGED_LLAMA_CPP_RELEASE_TAG
                  / "windows-x86_64-cpu"
              ).resolve()

              assert first.source == "managed_downloaded", first
              assert first.platform_variant == "windows-x86_64-cpu", first
              assert first.managed_root == expected_root, (first.managed_root, expected_root)
              assert resolved.exists(), resolved
              assert resolved.name.lower() == "llama-server.exe", resolved
              assert resolved.is_relative_to(expected_root), (resolved, expected_root)

              second = prepare_llama_server_runtime(
                  config=config,
                  project_root=project_root,
                  runtime_log_path=runtime_log_path,
              )

              assert second.source == "managed_cached", second
              assert second.platform_variant == "windows-x86_64-cpu", second
              assert second.managed_root == expected_root, (second.managed_root, expected_root)
              assert Path(second.command).resolve() == resolved, (second.command, resolved)

              handle = ensure_llama_server(
                  model_spec=model_spec,
                  config=config,
                  runtime_log_path=runtime_log_path,
                  project_root=project_root,
              )
              assert probe_server_ready(handle), handle

              same_handle = ensure_llama_server(
                  model_spec=model_spec,
                  config=config,
                  runtime_log_path=runtime_log_path,
                  project_root=project_root,
              )
              assert same_handle is handle

              client = build_openai_client(handle=handle)
              response = client.chat.completions.create(
                  model=model_spec.model_file,
                  messages=[{"role": "user", "content": "Reply with the single word OK."}],
                  max_tokens=8,
                  temperature=0,
              )
              content = str(response.choices[0].message.content or "").strip()
              assert content, response

              print(
                  json.dumps(
                      {
                          "project_root": str(project_root),
                          "managed_root": str(expected_root),
                          "command": str(resolved),
                          "release_tag": MANAGED_LLAMA_CPP_RELEASE_TAG,
                          "model_repo": model_spec.model_repo,
                          "model_file": model_spec.model_file,
                          "base_url": handle.base_url,
                          "first_source": first.source,
                          "second_source": second.source,
                          "response_preview": content[:120],
                      },
                      indent=2,
                  )
              )
          except Exception:
              if runtime_log_path.exists():
                  print("\n===== runtime.log =====\n")
                  print(runtime_log_path.read_text(encoding="utf-8", errors="replace"))
              raise
          finally:
              stop_all_llama_servers()
          '@ | & $venvPython -

  linux-managed-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install build dependency
        run: uv pip install build

      - name: Build wheel
        run: uv run python -m build --wheel

      - name: Wheel smoke (managed llama-server Linux CPU startup)
        run: |
          SMOKE_ROOT=/tmp/ads_pkg_smoke_linux
          rm -rf "$SMOKE_ROOT"
          uv venv "$SMOKE_ROOT"
          VENV_PYTHON="$SMOKE_ROOT/bin/python"
          WHEEL="$(ls dist/*.whl | head -n 1)"
          uv pip install --python "$VENV_PYTHON" "$WHEEL"
          cat <<'PY' | "$VENV_PYTHON"
          import json
          import os
          import stat
          import tempfile
          from pathlib import Path

          from ads_bib._utils.llama_server import (
              LlamaServerConfig,
              MANAGED_LLAMA_CPP_RELEASE_TAG,
              build_openai_client,
              ensure_llama_server,
              prepare_llama_server_runtime,
              probe_server_ready,
              stop_all_llama_servers,
          )
          from ads_bib._utils.model_specs import ModelSpec

          project_root = Path(tempfile.mkdtemp(prefix="ads-managed-runtime-")).resolve()
          os.environ["HF_HOME"] = str(project_root / "hf_home")
          os.environ["PATH"] = ""
          runtime_log_path = project_root / "runtime.log"

          config = LlamaServerConfig(
              command="llama-server",
              gpu_layers=0,
              ctx_size=2048,
              startup_timeout_s=240.0,
          )
          model_spec = ModelSpec(
              model_repo="Qwen/Qwen2.5-0.5B-Instruct-GGUF",
              model_file="qwen2.5-0.5b-instruct-q5_k_m.gguf",
          )

          try:
              first = prepare_llama_server_runtime(
                  config=config,
                  project_root=project_root,
                  runtime_log_path=runtime_log_path,
              )
              resolved = Path(first.command).resolve()
              expected_root = (
                  project_root
                  / "data"
                  / "models"
                  / "llama_cpp"
                  / MANAGED_LLAMA_CPP_RELEASE_TAG
                  / "linux-x86_64-cpu"
              ).resolve()

              assert first.source == "managed_downloaded", first
              assert first.platform_variant == "linux-x86_64-cpu", first
              assert first.managed_root == expected_root, (first.managed_root, expected_root)
              assert resolved.exists(), resolved
              assert resolved.name == "llama-server", resolved
              assert resolved.is_relative_to(expected_root), (resolved, expected_root)
              assert resolved.stat().st_mode & stat.S_IXUSR, oct(resolved.stat().st_mode)

              second = prepare_llama_server_runtime(
                  config=config,
                  project_root=project_root,
                  runtime_log_path=runtime_log_path,
              )

              assert second.source == "managed_cached", second
              assert second.platform_variant == "linux-x86_64-cpu", second
              assert second.managed_root == expected_root, (second.managed_root, expected_root)
              assert Path(second.command).resolve() == resolved, (second.command, resolved)

              handle = ensure_llama_server(
                  model_spec=model_spec,
                  config=config,
                  runtime_log_path=runtime_log_path,
                  project_root=project_root,
              )
              assert probe_server_ready(handle), handle

              same_handle = ensure_llama_server(
                  model_spec=model_spec,
                  config=config,
                  runtime_log_path=runtime_log_path,
                  project_root=project_root,
              )
              assert same_handle is handle

              client = build_openai_client(handle=handle)
              response = client.chat.completions.create(
                  model=model_spec.model_file,
                  messages=[{"role": "user", "content": "Reply with the single word OK."}],
                  max_tokens=8,
                  temperature=0,
              )
              content = str(response.choices[0].message.content or "").strip()
              assert content, response

              print(
                  json.dumps(
                      {
                          "project_root": str(project_root),
                          "managed_root": str(expected_root),
                          "command": str(resolved),
                          "release_tag": MANAGED_LLAMA_CPP_RELEASE_TAG,
                          "model_repo": model_spec.model_repo,
                          "model_file": model_spec.model_file,
                          "base_url": handle.base_url,
                          "first_source": first.source,
                          "second_source": second.source,
                          "response_preview": content[:120],
                      },
                      indent=2,
                  )
              )
          except Exception:
              if runtime_log_path.exists():
                  print("\n===== runtime.log =====\n")
                  print(runtime_log_path.read_text(encoding="utf-8", errors="replace"))
              raise
          finally:
              stop_all_llama_servers()
          PY
