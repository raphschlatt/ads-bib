name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (core + tests)
        run: uv sync --frozen --extra test

      - name: Ruff
        run: uv run ruff check src tests scripts

      - name: Pytest (excluding topic-stack tests)
        run: uv run pytest -q -m "not requires_topic_stack"

  topic-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Add swap (mitigate OOM during large pip installs)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Install dependencies (base + optional overrides + tests)
        run: |
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[test,umap,hdbscan]"
          uv pip install build twine

      - name: Pytest (full)
        run: uv run pytest -q

      - name: Build sdist/wheel
        run: uv run python -m build

      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Wheel smoke (core)
        run: |
          python -m venv /tmp/ads_pkg_smoke
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL"
          python -c "import ads_bib; print(ads_bib.__version__)"
          python -c "import ads_bib.search, ads_bib.export, ads_bib.tokenize, ads_bib.translate, ads_bib.citations"
          ads-bib preset list
          ads-bib preset write openrouter --output /tmp/ads-bib-smoke.yaml
          test -f /tmp/ads-bib-smoke.yaml
          grep -q "run_name: ads_bib_openrouter" /tmp/ads-bib-smoke.yaml
          ads-bib bootstrap --project-root /tmp/ads_bootstrap_smoke --env-file .env
          test -d /tmp/ads_bootstrap_smoke/data/raw
          test -d /tmp/ads_bootstrap_smoke/runs
          grep -q "ADS_TOKEN=" /tmp/ads_bootstrap_smoke/.env
          ADS_TOKEN=dummy ads-bib doctor --config /tmp/ads-bib-smoke.yaml --to search --set search.query='author:"test"'

      - name: Wheel smoke (optional overrides)
        run: |
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m pip install "$WHEEL[umap,hdbscan]"
          python -c "import ads_bib.topic_model, ads_bib.visualize"
