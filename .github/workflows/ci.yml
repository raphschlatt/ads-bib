name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[topic,translate-api,test,umap,hdbscan]"
          pip install build twine

      - name: Ruff
        run: ruff check src tests scripts

      - name: Pytest (full)
        run: pytest -q

      - name: Notebook contract
        run: pytest -q tests/test_pipeline_notebook_contract.py

      - name: Build sdist/wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Wheel smoke (core)
        run: |
          python -m venv /tmp/ads_pkg_smoke
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          pip install "$WHEEL"
          python -c "import ads_bib; print(ads_bib.__version__)"
          python -c "import ads_bib.search, ads_bib.export, ads_bib.tokenize, ads_bib.translate, ads_bib.citations"

      - name: Wheel smoke (topic extras)
        run: |
          . /tmp/ads_pkg_smoke/bin/activate
          WHEEL="$(ls dist/*.whl | head -n 1)"
          pip install "$WHEEL[topic,umap,hdbscan]"
          python -c "import ads_bib.topic_model, ads_bib.visualize"
