name: Docs

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build docs
        run: uv run zensical build --clean

      - name: Skip Pages publish while repository is private
        if: ${{ github.event.repository.private }}
        run: |
          echo "Repository is private, so this workflow only validates the docs build."
          echo "Pages upload/deploy will stay skipped until the repository is public and GitHub Pages is enabled."

      - name: Configure Pages
        if: ${{ !github.event.repository.private }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ !github.event.repository.private }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !github.event.repository.private }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
