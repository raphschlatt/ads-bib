run:
  run_name: hawking_openrouter
  start_stage: search
  stop_stage: null
  random_seed: 42
  openrouter_cost_mode: hybrid
  project_root: null

search:
  query: 'author:"Hawking, S*"'
  ads_token: null
  refresh_search: true
  refresh_export: true

translate:
  enabled: true
  provider: openrouter
  model: google/gemini-3.1-flash-lite-preview
  model_repo: null
  model_file: null
  model_path: null
  api_key: null
  max_workers: 8
  max_tokens: 2048
  fasttext_model: data/models/lid.176.bin

llama_server:
  command: llama-server
  host: 127.0.0.1
  port: null
  threads: null
  ctx_size: 4096
  gpu_layers: -1
  startup_timeout_s: 120.0
  reasoning: "off"

tokenize:
  enabled: true
  spacy_model: en_core_web_md
  batch_size: 512
  n_process: 1
  disable:
    - ner
    - parser
    - textcat
  fallback_model: en_core_web_md
  auto_download: true

author_disambiguation:
  enabled: false
  model_bundle: null
  dataset_id: null
  force_refresh: false
  infer_stage: full

topic_model:
  sample_size: null
  embedding_provider: openrouter
  embedding_model: qwen/qwen3-embedding-8b
  embedding_api_key: null
  embedding_batch_size: 32
  embedding_max_workers: 8
  reduction_method: pacmap
  params_5d:
    n_neighbors: 30
    metric: angular
    random_state: 42
  params_2d:
    n_neighbors: 30
    metric: angular
    random_state: 42
  backend: bertopic
  clustering_method: fast_hdbscan
  cluster_params:
    min_cluster_size: 15
    min_samples: 3
    cluster_selection_method: eom
    cluster_selection_epsilon: 0.05
  toponymy_cluster_params: {}
  toponymy_layer_index: auto
  llm_prompt_name: physics
  llm_prompt: null
  llm_provider: openrouter
  llm_model: google/gemini-3.1-flash-lite-preview
  llm_model_repo: null
  llm_model_file: null
  llm_model_path: null
  llm_api_key: null
  bertopic_label_max_tokens: 64
  toponymy_local_label_max_tokens: 128
  pipeline_models:
    - POS
    - KeyBERT
    - MMR
  parallel_models:
    - MMR
    - POS
    - KeyBERT
  toponymy_embedding_model: null
  toponymy_max_workers: 10
  min_df: 3
  outlier_threshold: 0.5

visualization:
  enabled: true
  title: Hawking ADS Bibliometric Map
  subtitle_template: "Topics labeled with {provider}/{model}"
  dark_mode: true
  font_family: Cinzel
  topic_tree: false

curation:
  cluster_targets: []
  clusters_to_remove: []

citations:
  metrics:
    - direct
    - co_citation
    - bibliographic_coupling
    - author_co_citation
  min_counts:
    direct: 3
    co_citation: 6
    bibliographic_coupling: 3
    author_co_citation: 5
  authors_filter: null
  output_format: gexf
