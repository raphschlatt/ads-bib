run:
  run_name: ADS_Curation_Run
  start_stage: search
  stop_stage: null
  random_seed: 42
  openrouter_cost_mode: hybrid
  project_root: null
search:
  query: ""
  ads_token: null
  refresh_search: true
  refresh_export: true
translate:
  # Translate runtimes: nllb (local seq2seq), gguf (optional local llama-cpp-python), huggingface_api, openrouter
  enabled: true
  provider: openrouter
  model: google/gemini-3-flash-preview
  api_key: null
  max_workers: 10
  max_tokens: 2048
  fasttext_model: null
tokenize:
  enabled: true
  spacy_model: en_core_web_md
  batch_size: 512
  n_process: 1
  disable:
    - ner
    - parser
    - textcat
  fallback_model: en_core_web_md
  auto_download: true
author_disambiguation:
  enabled: false
  model_bundle: null
  dataset_id: null
  force_refresh: false
  infer_stage: full
topic_model:
  sample_size: null
  # Embeddings: local (HF CPU/GPU), gguf (optional local llama-cpp-python), huggingface_api, openrouter
  embedding_provider: openrouter
  embedding_model: google/gemini-embedding-001
  embedding_api_key: null
  embedding_batch_size: 64
  embedding_max_workers: 20
  gguf_embedding_pooling: cls
  reduction_method: pacmap
  params_5d: {}
  params_2d: {}
  backend: bertopic
  clustering_method: fast_hdbscan
  cluster_params: {}
  toponymy_cluster_params: {}
  toponymy_evoc_cluster_params: {}
  toponymy_layer_index: 1
  llm_prompt_name: physics
  llm_prompt: null
  # BERTopic labeling: local (HF CPU/GPU), gguf, huggingface_api, openrouter
  # Toponymy naming: local (HF CPU/GPU), gguf, openrouter
  llm_provider: openrouter
  llm_model: google/gemini-3-flash-preview
  llm_api_key: null
  bertopic_label_max_tokens: 128
  toponymy_local_label_max_tokens: 256
  pipeline_models:
    - POS
    - KeyBERT
    - MMR
  parallel_models:
    - MMR
    - POS
    - KeyBERT
  toponymy_embedding_model: null
  toponymy_max_workers: 10
  min_df: null
  outlier_threshold: 0.5
visualization:
  enabled: true
  title: ADS Bibliometric Map
  subtitle_template: "Topics labeled with {provider}/{model}"
  dark_mode: true
curation:
  clusters_to_remove: []
citations:
  metrics:
    - direct
    - co_citation
    - bibliographic_coupling
    - author_co_citation
  min_counts:
    direct: 1
    co_citation: 1
    bibliographic_coupling: 1
    author_co_citation: 1
  authors_filter: null
  output_format: gexf
